---
- name: Install Samba package
  ansible.builtin.apt:
    name: "{{ samba_package_name }}"
    state: present
  when: samba_enabled | bool

- name: Ensure Samba share root exists
  ansible.builtin.file:
    path: "{{ samba_share_root }}"
    state: directory
    owner: root
    group: root
    mode: "{{ samba_share_root_mode }}"
  when: samba_enabled | bool

- name: Ensure Samba share directory exists
  ansible.builtin.file:
    path: "{{ samba_share_path }}"
    state: directory
    owner: "{{ samba_share_force_user }}"
    group: "{{ samba_share_force_group }}"
    mode: "{{ samba_share_directory_mode }}"
  when: samba_enabled | bool

- name: Deploy Samba configuration
  ansible.builtin.template:
    src: smb.conf.j2
    dest: "{{ samba_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Samba services
  when: samba_enabled | bool

- name: Ensure Samba service is enabled and running
  ansible.builtin.service:
    name: "{{ samba_service_name }}"
    state: started
    enabled: true
  when:
    - samba_enabled | bool
    - not ansible_check_mode

- name: Ensure NetBIOS service is enabled and running when requested
  ansible.builtin.service:
    name: "{{ samba_netbios_service_name }}"
    state: started
    enabled: true
  when:
    - samba_enabled | bool
    - samba_manage_nmbd | bool
    - not ansible_check_mode
