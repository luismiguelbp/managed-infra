---
- name: Docker fleet status
  hosts: linux_hosts
  gather_facts: false
  pre_tasks:
    - name: Load edge stack role defaults
      ansible.builtin.include_vars:
        file: ../roles/edge_stack/defaults/main.yml
        name: edge_stack_role_defaults

    - name: Apply edge stack path default when inventory omits it
      ansible.builtin.set_fact:
        edge_stack_path: "{{ edge_stack_role_defaults.edge_stack_path }}"
      when: edge_stack_path is not defined
  tasks:
    - name: Check whether edge stack environment file exists
      ansible.builtin.stat:
        path: "{{ edge_stack_path }}/.env"
      register: edge_stack_env_file

    - name: Check Docker daemon state
      ansible.builtin.command: systemctl is-active docker
      register: docker_service_status
      changed_when: false
      failed_when: false

    - name: Check Docker Compose version
      ansible.builtin.command: docker compose version
      register: docker_compose_version
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ ansible_user }}"
      when: edge_stack_env_file.stat.exists

    - name: Check edge stack containers
      ansible.builtin.command: docker compose ps
      args:
        chdir: "{{ edge_stack_path }}"
      register: docker_compose_ps
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ ansible_user }}"
      when: edge_stack_env_file.stat.exists

    - name: Check edge stack container health
      ansible.builtin.command: docker compose ps --format json
      args:
        chdir: "{{ edge_stack_path }}"
      register: docker_compose_ps_json
      changed_when: false
      become: true
      become_user: "{{ ansible_user }}"
      when: edge_stack_env_file.stat.exists

    - name: Parse edge stack container health
      ansible.builtin.set_fact:
        edge_stack_ps_containers: >-
          {{
            docker_compose_ps_json.stdout_lines
            | default([])
            | reject('equalto', '')
            | map('from_json')
            | list
          }}
      when: edge_stack_env_file.stat.exists

    - name: Evaluate edge stack container health
      ansible.builtin.set_fact:
        edge_stack_container_count: "{{ edge_stack_ps_containers | length }}"
        edge_stack_health_failures: >-
          {{
            (edge_stack_ps_containers | rejectattr('State', 'equalto', 'running') | map(attribute='Service') | list)
            + (
              edge_stack_ps_containers
              | selectattr('Health', 'defined')
              | selectattr('Health', 'ne', '')
              | rejectattr('Health', 'equalto', 'healthy')
              | map(attribute='Service')
              | list
            )
          }}
      when: edge_stack_env_file.stat.exists

    - name: Check uptime
      ansible.builtin.command: uptime
      register: host_uptime
      changed_when: false

    - name: Check root disk usage
      ansible.builtin.shell: df -h / 2>/dev/null | tail -1
      register: root_disk_usage
      changed_when: false

    - name: Check edge stack path disk usage
      ansible.builtin.shell: df -h "{{ edge_stack_path }}" 2>/dev/null | tail -1 || echo NO_EDGE_STACK_PATH
      register: edge_stack_disk_usage
      changed_when: false

    - name: Build compose status text
      ansible.builtin.set_fact:
        docker_compose_ps_text: >-
          {{
            docker_compose_ps.stdout
            if edge_stack_env_file.stat.exists and (docker_compose_ps.stdout | default('') | length > 0)
            else 'NO_EDGE_STACK'
          }}

    - name: Build compose version text
      ansible.builtin.set_fact:
        docker_compose_version_text: >-
          {{
            docker_compose_version.stdout
            if edge_stack_env_file.stat.exists and (docker_compose_version.stdout | default('') | length > 0)
            else 'NO_EDGE_STACK'
          }}

    - name: Build edge stack health text
      ansible.builtin.set_fact:
        edge_stack_health_text: >-
          {{
            'NO_EDGE_STACK'
            if not edge_stack_env_file.stat.exists
            else (
              'ok'
              if edge_stack_container_count | int > 0 and edge_stack_health_failures | length == 0
              else (
                'no containers running'
                if edge_stack_container_count | int == 0
                else 'failed: ' + (edge_stack_health_failures | unique | join(', '))
              )
            )
          }}

    - name: Print host status summary
      ansible.builtin.debug:
        msg:
          - "host={{ inventory_hostname }}"
          - "docker_service={{ docker_service_status.stdout | default('unknown') }}"
          - "compose_version={{ docker_compose_version_text }}"
          - "compose_ps={{ docker_compose_ps_text }}"
          - "edge_stack_health={{ edge_stack_health_text }}"
          - "uptime={{ host_uptime.stdout }}"
          - "root_disk={{ root_disk_usage.stdout | default('unknown') }}"
          - "edge_stack_disk={{ edge_stack_disk_usage.stdout | default('unknown') }}"

    - name: Assert edge stack containers are healthy
      ansible.builtin.assert:
        that:
          - edge_stack_container_count | int > 0
          - edge_stack_health_failures | length == 0
        fail_msg: >-
          Edge stack health check failed on {{ inventory_hostname }}:
          {{ 'no containers running' if edge_stack_container_count | int == 0
             else 'unhealthy or not running: ' + (edge_stack_health_failures | unique | join(', ')) }}
      when: edge_stack_env_file.stat.exists
