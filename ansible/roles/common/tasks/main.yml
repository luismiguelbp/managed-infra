---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: [common, update]

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  tags: [common, update]

- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  tags: [common, update]

- name: Reboot when kernel or libc updates require it
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - reboot_after_upgrade | bool
    - reboot_required_file.stat.exists
  tags: [common, update]

- name: Reboot fleet on demand
  ansible.builtin.include_tasks: reboot.yml
  tags: [reboot]
