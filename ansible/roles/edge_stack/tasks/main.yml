---
- name: Resolve SSH user UID and GID for Node-RED volume permissions
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"
  register: edge_stack_user_passwd

- name: Set edge stack runtime user ids
  ansible.builtin.set_fact:
    edge_stack_uid: "{{ edge_stack_user_passwd.ansible_facts.getent_passwd[ansible_user][1] }}"
    edge_stack_gid: "{{ edge_stack_user_passwd.ansible_facts.getent_passwd[ansible_user][2] }}"

- name: Ensure edge stack base directory exists
  ansible.builtin.file:
    path: "{{ edge_stack_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Ensure edge stack data directories exist
  ansible.builtin.file:
    path: "{{ edge_stack_path }}/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ edge_stack_data_dirs }}"

- name: Deploy Compose files from repository
  ansible.builtin.copy:
    src: "{{ edge_stack_local_src }}/{{ item }}"
    dest: "{{ edge_stack_path }}/{{ item }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  loop: "{{ edge_stack_compose_files }}"

- name: Deploy environment example
  ansible.builtin.copy:
    src: "{{ edge_stack_local_src }}/env.example"
    dest: "{{ edge_stack_path }}/env.example"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Check whether local edge stack environment file exists
  ansible.builtin.stat:
    path: "{{ edge_stack_local_src }}/.env"
  delegate_to: localhost
  become: false
  run_once: true
  register: edge_stack_local_env_file

- name: Deploy edge stack environment file from control machine
  ansible.builtin.copy:
    src: "{{ edge_stack_local_src }}/.env"
    dest: "{{ edge_stack_path }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  no_log: true
  when: edge_stack_local_env_file.stat.exists

- name: Check edge stack data files on host
  ansible.builtin.stat:
    path: "{{ edge_stack_path }}/{{ item.src }}"
  loop: "{{ edge_stack_data_files }}"
  register: edge_stack_data_file_stats

- name: Install edge stack data files when missing
  ansible.builtin.copy:
    src: "{{ edge_stack_local_src }}/{{ item.item.src }}"
    dest: "{{ edge_stack_path }}/{{ item.item.src }}"
    owner: >-
      {{ edge_stack_mosquitto_uid if item.item.owner == 'mosquitto' else edge_stack_uid }}
    group: >-
      {{ edge_stack_mosquitto_gid if item.item.owner == 'mosquitto' else edge_stack_gid }}
    mode: "{{ item.item.mode }}"
  loop: "{{ edge_stack_data_file_stats.results }}"
  when: not item.stat.exists

- name: Check whether edge stack environment file exists on host
  ansible.builtin.stat:
    path: "{{ edge_stack_path }}/.env"
  register: edge_stack_env_file

- name: Ensure COMPOSE_FILE matches host edge stack profile
  ansible.builtin.lineinfile:
    path: "{{ edge_stack_path }}/.env"
    regexp: '^COMPOSE_FILE='
    line: "COMPOSE_FILE={{ edge_stack_compose_file_var }}"
  when: edge_stack_env_file.stat.exists

- name: Ensure COMPOSE_PROJECT_NAME matches inventory hostname
  ansible.builtin.lineinfile:
    path: "{{ edge_stack_path }}/.env"
    regexp: '^COMPOSE_PROJECT_NAME='
    line: "COMPOSE_PROJECT_NAME={{ edge_stack_project_name }}"
  when: edge_stack_env_file.stat.exists

- name: Set Mosquitto data ownership
  ansible.builtin.file:
    path: "{{ edge_stack_path }}/data/mosquitto"
    state: directory
    owner: "{{ edge_stack_mosquitto_uid }}"
    group: "{{ edge_stack_mosquitto_gid }}"
    recurse: true
  when: "'compose-mosquitto.yml' in edge_stack_compose_files"

- name: Set Node-RED data ownership
  ansible.builtin.file:
    path: "{{ edge_stack_path }}/data/node-red"
    state: directory
    owner: "{{ edge_stack_uid }}"
    group: "{{ edge_stack_gid }}"
    recurse: true
  when: "'compose-node-red.yml' in edge_stack_compose_files"

- name: Set Grafana data ownership
  ansible.builtin.file:
    path: "{{ edge_stack_path }}/data/grafana"
    state: directory
    owner: "{{ edge_stack_uid }}"
    group: "{{ edge_stack_gid }}"
    recurse: true
  when: "'compose-grafana.yml' in edge_stack_compose_files"

- name: Build edge stack publish ports list
  ansible.builtin.set_fact:
    edge_stack_publish_ports: >-
      {{
        ([]
        + ([9443] if 'compose-portainer.yml' in edge_stack_compose_files else [])
        + ([1880] if 'compose-node-red.yml' in edge_stack_compose_files else [])
        + ([1883, 8883, 9001] if 'compose-mosquitto.yml' in edge_stack_compose_files else [])
        + ([5432] if 'compose-postgresql.yml' in edge_stack_compose_files else [])
        + ([3000] if 'compose-grafana.yml' in edge_stack_compose_files else [])
        ) | unique
      }}

- name: Ensure shared docker-bridge network exists
  community.docker.docker_network:
    name: docker-bridge
    driver: bridge
  become: true
  become_user: "{{ ansible_user }}"
  when: edge_stack_env_file.stat.exists

- name: Find foreign containers blocking edge stack ports
  ansible.builtin.shell: |
    set -o pipefail
    project="{{ edge_stack_project_name }}"
    found=""
    for port in {{ edge_stack_publish_ports | join(' ') }}; do
      names=$(docker ps --filter "publish=${port}" --format '{{ "{{" }}.Names{{ "}}" }}' 2>/dev/null || true)
      for name in $names; do
        case "$name" in
          ${project}_*) ;;
          *) found="$found $name" ;;
        esac
      done
    done
    echo "$found" | tr ' ' '\n' | sort -u | grep -v '^$' || true
  args:
    executable: /bin/bash
  register: edge_stack_foreign_containers
  changed_when: false
  become: true
  become_user: "{{ ansible_user }}"
  when: edge_stack_env_file.stat.exists

- name: Stop foreign containers blocking edge stack ports
  ansible.builtin.command: docker stop {{ item }}
  loop: "{{ edge_stack_foreign_containers.stdout_lines }}"
  become: true
  become_user: "{{ ansible_user }}"
  when:
    - edge_stack_env_file.stat.exists
    - edge_stack_foreign_containers.stdout_lines | length > 0

- name: Remove foreign containers blocking edge stack ports
  ansible.builtin.command: docker rm {{ item }}
  loop: "{{ edge_stack_foreign_containers.stdout_lines }}"
  become: true
  become_user: "{{ ansible_user }}"
  when:
    - edge_stack_env_file.stat.exists
    - edge_stack_foreign_containers.stdout_lines | length > 0

- name: Remove stale edge stack containers before start
  community.docker.docker_compose_v2:
    project_src: "{{ edge_stack_path }}"
    files: "{{ edge_stack_compose_files }}"
    env_files:
      - "{{ edge_stack_path }}/.env"
    state: absent
  become: true
  become_user: "{{ ansible_user }}"
  when: edge_stack_env_file.stat.exists

- name: Start edge stack services
  community.docker.docker_compose_v2:
    project_src: "{{ edge_stack_path }}"
    files: "{{ edge_stack_compose_files }}"
    env_files:
      - "{{ edge_stack_path }}/.env"
    state: present
    pull: "{{ 'always' if edge_stack_pull_images | bool else 'missing' }}"
  become: true
  become_user: "{{ ansible_user }}"
  when: edge_stack_env_file.stat.exists
