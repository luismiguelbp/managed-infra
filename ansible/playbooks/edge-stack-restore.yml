---
- name: Restore edge stack data from control machine backup mirror
  hosts: raspberry_pis
  gather_facts: false
  vars_files:
    - ../roles/edge_stack/defaults/main.yml
  vars:
    # Backup folder name under MANAGED_INFRA_BACKUP_DEST (defaults to --limit host).
    edge_stack_restore_source: "{{ inventory_hostname }}"
    # Copy mirrored .env and reconcile COMPOSE_FILE / COMPOSE_PROJECT_NAME for the target.
    edge_stack_restore_env: false
    # Stop compose services before restore and bring them back up afterward.
    edge_stack_restore_stop_services: true
    host_backup_root: "{{ managed_infra_backup_dest }}/{{ edge_stack_restore_source }}"
    host_backup_data_root: "{{ host_backup_root }}/data"
    host_backup_dumps_root: "{{ host_backup_root }}/dumps"
    remote_env_path: "{{ edge_stack_path }}/.env"
    remote_postgresql_dump_path: "/tmp/{{ inventory_hostname }}-postgresql-restore.sql"
    remote_mosquitto_dir: "{{ edge_stack_path }}/data/mosquitto"
    remote_node_red_dir: "{{ edge_stack_path }}/data/node-red"
    remote_grafana_dir: "{{ edge_stack_path }}/data/grafana"
    local_mosquitto_dir: "{{ host_backup_data_root }}/mosquitto"
    local_node_red_dir: "{{ host_backup_data_root }}/node-red"
    local_grafana_dir: "{{ host_backup_data_root }}/grafana"
    local_postgresql_dump: "{{ host_backup_dumps_root }}/postgresql.sql"
    local_backup_env_path: "{{ host_backup_root }}/.env"
    edge_stack_restore_service_compose:
      mosquitto: compose-mosquitto.yml
      node_red: compose-node-red.yml
      grafana: compose-grafana.yml
      postgresql: compose-postgresql.yml
  tasks:
    - name: Load backup manifest
      ansible.builtin.slurp:
        src: "{{ host_backup_root }}/manifest.json"
      delegate_to: localhost
      become: false
      register: backup_manifest_file

    - name: Parse backup manifest
      ansible.builtin.set_fact:
        backup_manifest: "{{ backup_manifest_file.content | b64decode | from_json }}"

    - name: Warn when backup includes services not on target host
      ansible.builtin.debug:
        msg: >-
          Skipping restore for {{ item.key }}:
          backup has it but target profile lacks {{ item.value }}.
      loop: "{{ edge_stack_restore_service_compose | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when:
        - backup_manifest.services[item.key] | default(false)
        - item.value not in edge_stack_compose_files

    - name: Warn when target host expects services missing from backup
      ansible.builtin.debug:
        msg: >-
          Skipping restore for {{ item.key }}:
          target profile includes {{ item.value }} but backup manifest does not.
      loop: "{{ edge_stack_restore_service_compose | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when:
        - item.value in edge_stack_compose_files
        - not (backup_manifest.services[item.key] | default(false))

    - name: Resolve SSH user UID and GID for restored data ownership
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_user }}"
      register: edge_stack_user_passwd

    - name: Set edge stack runtime user ids
      ansible.builtin.set_fact:
        edge_stack_uid: "{{ edge_stack_user_passwd.ansible_facts.getent_passwd[ansible_user][1] }}"
        edge_stack_gid: "{{ edge_stack_user_passwd.ansible_facts.getent_passwd[ansible_user][2] }}"

    - name: Check whether edge stack environment file exists on host
      ansible.builtin.stat:
        path: "{{ remote_env_path }}"
      register: edge_stack_env_file_before_restore

    - name: Check whether mirrored environment file exists locally
      ansible.builtin.stat:
        path: "{{ local_backup_env_path }}"
      delegate_to: localhost
      become: false
      register: backup_env_file

    - name: Stop edge stack services before restore
      ansible.builtin.command: docker compose stop
      args:
        chdir: "{{ edge_stack_path }}"
      changed_when: false
      become: true
      become_user: "{{ ansible_user }}"
      when:
        - edge_stack_restore_stop_services | bool
        - edge_stack_env_file_before_restore.stat.exists

    - name: Restore host environment file from backup mirror
      ansible.builtin.copy:
        src: "{{ local_backup_env_path }}"
        dest: "{{ remote_env_path }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true
      when:
        - edge_stack_restore_env | bool
        - backup_env_file.stat.exists

    - name: Reconcile COMPOSE_FILE for target host profile
      ansible.builtin.lineinfile:
        path: "{{ remote_env_path }}"
        regexp: '^COMPOSE_FILE='
        line: "COMPOSE_FILE={{ edge_stack_compose_file_var }}"
      when:
        - edge_stack_restore_env | bool
        - backup_env_file.stat.exists

    - name: Reconcile COMPOSE_PROJECT_NAME for target inventory hostname
      ansible.builtin.lineinfile:
        path: "{{ remote_env_path }}"
        regexp: '^COMPOSE_PROJECT_NAME='
        line: "COMPOSE_PROJECT_NAME={{ edge_stack_project_name }}"
      when:
        - edge_stack_restore_env | bool
        - backup_env_file.stat.exists

    - name: Check whether edge stack environment file exists after restore changes
      ansible.builtin.stat:
        path: "{{ remote_env_path }}"
      register: edge_stack_env_file_after_restore

    - name: Check Mosquitto backup data on control machine
      ansible.builtin.stat:
        path: "{{ local_mosquitto_dir }}"
      delegate_to: localhost
      become: false
      register: local_mosquitto_dir_stat
      when:
        - backup_manifest.services.mosquitto | default(false)
        - "'compose-mosquitto.yml' in edge_stack_compose_files"

    - name: Restore Mosquitto data directory
      ansible.posix.synchronize:
        mode: push
        src: "{{ local_mosquitto_dir }}/"
        dest: "{{ remote_mosquitto_dir }}/"
        archive: true
        delete: true
        rsync_opts:
          - "--exclude=log/"
      when:
        - backup_manifest.services.mosquitto | default(false)
        - "'compose-mosquitto.yml' in edge_stack_compose_files"
        - local_mosquitto_dir_stat is defined
        - local_mosquitto_dir_stat.stat.exists

    - name: Check Node-RED backup data on control machine
      ansible.builtin.stat:
        path: "{{ local_node_red_dir }}"
      delegate_to: localhost
      become: false
      register: local_node_red_dir_stat
      when:
        - backup_manifest.services.node_red | default(false)
        - "'compose-node-red.yml' in edge_stack_compose_files"

    - name: Restore Node-RED data directory
      ansible.posix.synchronize:
        mode: push
        src: "{{ local_node_red_dir }}/"
        dest: "{{ remote_node_red_dir }}/"
        archive: true
        delete: true
      when:
        - backup_manifest.services.node_red | default(false)
        - "'compose-node-red.yml' in edge_stack_compose_files"
        - local_node_red_dir_stat is defined
        - local_node_red_dir_stat.stat.exists

    - name: Check Grafana backup data on control machine
      ansible.builtin.stat:
        path: "{{ local_grafana_dir }}"
      delegate_to: localhost
      become: false
      register: local_grafana_dir_stat
      when:
        - backup_manifest.services.grafana | default(false)
        - "'compose-grafana.yml' in edge_stack_compose_files"

    - name: Restore Grafana data directory
      ansible.posix.synchronize:
        mode: push
        src: "{{ local_grafana_dir }}/"
        dest: "{{ remote_grafana_dir }}/"
        archive: true
        delete: true
      when:
        - backup_manifest.services.grafana | default(false)
        - "'compose-grafana.yml' in edge_stack_compose_files"
        - local_grafana_dir_stat is defined
        - local_grafana_dir_stat.stat.exists

    - name: Check PostgreSQL dump on control machine
      ansible.builtin.stat:
        path: "{{ local_postgresql_dump }}"
      delegate_to: localhost
      become: false
      register: local_postgresql_dump_stat
      when:
        - backup_manifest.services.postgresql | default(false)
        - "'compose-postgresql.yml' in edge_stack_compose_files"

    - name: Copy PostgreSQL dump to host
      ansible.builtin.copy:
        src: "{{ local_postgresql_dump }}"
        dest: "{{ remote_postgresql_dump_path }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true
      when:
        - backup_manifest.services.postgresql | default(false)
        - "'compose-postgresql.yml' in edge_stack_compose_files"
        - local_postgresql_dump_stat is defined
        - local_postgresql_dump_stat.stat.exists

    - name: Start PostgreSQL before dump import
      community.docker.docker_compose_v2:
        project_src: "{{ edge_stack_path }}"
        files: "{{ edge_stack_compose_files }}"
        env_files:
          - "{{ edge_stack_path }}/.env"
        services:
          - postgresql
        state: present
      become: true
      become_user: "{{ ansible_user }}"
      when:
        - edge_stack_restore_stop_services | bool
        - backup_manifest.services.postgresql | default(false)
        - "'compose-postgresql.yml' in edge_stack_compose_files"
        - local_postgresql_dump_stat is defined
        - local_postgresql_dump_stat.stat.exists
        - edge_stack_env_file_after_restore.stat.exists

    - name: Import PostgreSQL dump on host
      ansible.builtin.shell: >-
        docker compose exec -T postgresql psql
        -U "${POSTGRES_USER:-admin}"
        -d "${POSTGRES_DB:-automation}"
        < "{{ remote_postgresql_dump_path }}"
      args:
        chdir: "{{ edge_stack_path }}"
      register: postgresql_restore_result
      changed_when: postgresql_restore_result.rc == 0
      failed_when: postgresql_restore_result.rc != 0
      no_log: true
      become: true
      become_user: "{{ ansible_user }}"
      when:
        - backup_manifest.services.postgresql | default(false)
        - "'compose-postgresql.yml' in edge_stack_compose_files"
        - local_postgresql_dump_stat is defined
        - local_postgresql_dump_stat.stat.exists
        - edge_stack_env_file_after_restore.stat.exists

    - name: Remove temporary PostgreSQL dump file from host
      ansible.builtin.file:
        path: "{{ remote_postgresql_dump_path }}"
        state: absent
      when:
        - postgresql_restore_result is defined
        - (postgresql_restore_result.rc | default(1)) == 0

    - name: Set Mosquitto data ownership
      ansible.builtin.file:
        path: "{{ remote_mosquitto_dir }}"
        state: directory
        owner: "{{ edge_stack_mosquitto_uid }}"
        group: "{{ edge_stack_mosquitto_gid }}"
        recurse: true
      when:
        - backup_manifest.services.mosquitto | default(false)
        - "'compose-mosquitto.yml' in edge_stack_compose_files"
        - local_mosquitto_dir_stat is defined
        - local_mosquitto_dir_stat.stat.exists

    - name: Set Node-RED data ownership
      ansible.builtin.file:
        path: "{{ remote_node_red_dir }}"
        state: directory
        owner: "{{ edge_stack_uid }}"
        group: "{{ edge_stack_gid }}"
        recurse: true
      when:
        - backup_manifest.services.node_red | default(false)
        - "'compose-node-red.yml' in edge_stack_compose_files"
        - local_node_red_dir_stat is defined
        - local_node_red_dir_stat.stat.exists

    - name: Set Grafana data ownership
      ansible.builtin.file:
        path: "{{ remote_grafana_dir }}"
        state: directory
        owner: "{{ edge_stack_uid }}"
        group: "{{ edge_stack_gid }}"
        recurse: true
      when:
        - backup_manifest.services.grafana | default(false)
        - "'compose-grafana.yml' in edge_stack_compose_files"
        - local_grafana_dir_stat is defined
        - local_grafana_dir_stat.stat.exists

    - name: Start edge stack services after restore
      community.docker.docker_compose_v2:
        project_src: "{{ edge_stack_path }}"
        files: "{{ edge_stack_compose_files }}"
        env_files:
          - "{{ edge_stack_path }}/.env"
        state: present
      become: true
      become_user: "{{ ansible_user }}"
      when:
        - edge_stack_restore_stop_services | bool
        - edge_stack_env_file_after_restore.stat.exists
