# PostgreSQL Database
# Add to COMPOSE_FILE in .env: compose.yml,compose-postgresql.yml
#
# Default credentials (change in .env):
#   User: admin
#   Password: changeme
#   Database: automation

services:
  postgresql:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_postgresql
    hostname: postgresql
    ports:
      - "5432:5432"
    volumes:
      - ${DOCKER_PATH}/data/postgresql/data:/var/lib/postgresql/data:rw
    environment:
      - TZ=${DOCKER_TZ}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-automation}
    networks:
      - docker-bridge
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-automation}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
